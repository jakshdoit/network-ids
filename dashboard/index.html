<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Network IDS — Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { color: #58a6ff; font-size: 1.3rem; letter-spacing: 1px; }
    #status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #f85149;
      display: inline-block;
      margin-right: 8px;
    }
    #status-dot.active { background: #3fb950; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }

    .controls {
      padding: 20px 32px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 8px 24px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #btn-start { background: #238636; color: #fff; }
    #btn-stop  { background: #b62324; color: #fff; }
    #uptime    { color: #8b949e; font-size: 0.85rem; margin-left: 12px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 0 32px 24px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .stat-card .label { color: #8b949e; font-size: 0.8rem; letter-spacing: 1px; }
    #total-val   { color: #58a6ff; }
    #normal-val  { color: #3fb950; }
    #anomaly-val { color: #f85149; }

    .section {
      padding: 0 32px 32px;
    }
    .section h2 {
      font-size: 0.9rem;
      color: #8b949e;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    #feed {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      height: 260px;
      overflow-y: auto;
      padding: 12px;
      font-size: 0.8rem;
    }
    .feed-row {
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .feed-row:last-child { border-bottom: none; }
    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
      min-width: 72px;
      text-align: center;
    }
    .badge.NORMAL  { background: #1a4a1e; color: #3fb950; }
    .badge.ANOMALY { background: #4a1a1a; color: #f85149; }
    .feed-meta { color: #8b949e; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead th {
      background: #161b22;
      color: #8b949e;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #30363d;
      letter-spacing: 0.5px;
    }
    tbody tr { border-bottom: 1px solid #21262d; }
    tbody tr:hover { background: #161b22; }
    tbody td { padding: 9px 12px; }
    .score-neg { color: #f85149; }
    .score-pos { color: #3fb950; }
    #no-alerts { color: #8b949e; padding: 16px; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>🛡️ Network IDS Dashboard</h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-text">Idle</span>
  </div>
</header>

<div class="controls">
  <button id="btn-start" onclick="startSniffer()">▶ Start</button>
  <button id="btn-stop"  onclick="stopSniffer()">■ Stop</button>
  <span id="uptime">Uptime: —</span>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="value" id="total-val">0</div>
    <div class="label">Total Packets</div>
  </div>
  <div class="stat-card">
    <div class="value" id="normal-val">0</div>
    <div class="label">Normal</div>
  </div>
  <div class="stat-card">
    <div class="value" id="anomaly-val">0</div>
    <div class="label">Anomalies</div>
  </div>
</div>

<div class="section">
  <h2>📡 Live Detection Feed</h2>
  <div id="feed"><span style="color:#8b949e">Waiting for packets...</span></div>
</div>

<div class="section">
  <h2>🚨 Recent Alerts</h2>
  <table id="alerts-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Src IP</th>
        <th>Dst IP</th>
        <th>Protocol</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="alerts-body">
      <tr><td colspan="5" id="no-alerts">No alerts yet</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API = "http://localhost:5001";
  const socket = io(API);
  let uptimeInterval = null;
  let startedAt = null;

  // ── SocketIO — live detections ────────────────────────────────────────────
  socket.on("connect",    () => console.log("Socket connected"));
  socket.on("disconnect", () => console.log("Socket disconnected"));

  socket.on("detection", data => {
    updateFeed(data);
    refreshStats();
    if (data.label === "ANOMALY") addAlertRow(data);
  });

  // ── Feed ──────────────────────────────────────────────────────────────────
  function updateFeed(data) {
    const feed = document.getElementById("feed");
    if (feed.querySelector("span")) feed.innerHTML = "";

    const src = data.src_port ? `${data.src_ip}:${data.src_port}` : data.src_ip;
    const dst = data.dst_port ? `${data.dst_ip}:${data.dst_port}` : data.dst_ip;
    const time = new Date(data.timestamp).toLocaleTimeString();

    const row = document.createElement("div");
    row.className = "feed-row";
    row.innerHTML = `
      <span class="badge ${data.label}">${data.label}</span>
      <span class="feed-meta">${time}</span>
      <span>${src} → ${dst}</span>
      <span class="feed-meta">${data.protocol} | ${data.pkt_len}B</span>
      <span class="${data.score < 0 ? 'score-neg' : 'score-pos'}">${data.score > 0 ? '+' : ''}${data.score.toFixed(4)}</span>
    `;
    feed.prepend(row);

    // Keep max 100 rows
    while (feed.children.length > 100) feed.removeChild(feed.lastChild);
  }

  // ── Alerts table ──────────────────────────────────────────────────────────
  function addAlertRow(data) {
    const tbody = document.getElementById("alerts-body");
    const noAlerts = document.getElementById("no-alerts");
    if (noAlerts) noAlerts.remove();

    const time = new Date(data.timestamp).toLocaleTimeString();
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${time}</td>
      <td>${data.src_ip}</td>
      <td>${data.dst_ip}</td>
      <td>${data.protocol}</td>
      <td class="score-neg">${data.score.toFixed(4)}</td>
    `;
    tbody.prepend(tr);
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function refreshStats() {
    fetch(`${API}/api/stats`)
      .then(r => r.json())
      .then(s => {
        document.getElementById("total-val").textContent   = s.total;
        document.getElementById("normal-val").textContent  = s.normal;
        document.getElementById("anomaly-val").textContent = s.anomalies;
      });
  }

  // ── Uptime ────────────────────────────────────────────────────────────────
  function startUptimeClock() {
    startedAt = Date.now();
    uptimeInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - startedAt) / 1000);
      const h = String(Math.floor(secs / 3600)).padStart(2,"0");
      const m = String(Math.floor((secs % 3600) / 60)).padStart(2,"0");
      const s = String(secs % 60).padStart(2,"0");
      document.getElementById("uptime").textContent = `Uptime: ${h}:${m}:${s}`;
    }, 1000);
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  function startSniffer() {
    fetch(`${API}/api/start`, { method: "POST" })
      .then(r => r.json())
      .then(() => {
        document.getElementById("status-dot").classList.add("active");
        document.getElementById("status-text").textContent = "Running";
        startUptimeClock();
      });
  }

  function stopSniffer() {
    fetch(`${API}/api/stop`, { method: "POST" })
      .then(r => r.json())
      .then(() => {
        document.getElementById("status-dot").classList.remove("active");
        document.getElementById("status-text").textContent = "Idle";
        clearInterval(uptimeInterval);
      });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  fetch(`${API}/api/status`)
    .then(r => r.json())
    .then(s => {
      if (s.running) {
        document.getElementById("status-dot").classList.add("active");
        document.getElementById("status-text").textContent = "Running";
        startUptimeClock();
      }
      document.getElementById("total-val").textContent   = s.stats.total;
      document.getElementById("normal-val").textContent  = s.stats.normal;
      document.getElementById("anomaly-val").textContent = s.stats.anomalies;
    });
</script>
</body>
</html>
